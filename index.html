<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billboard Hot 100</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, html { background: transparent; }
  #widget {
    background: transparent;
    width: 100%;
    font-family: sans-serif;
    color: white;
    overflow: hidden;
    height: 520px;
    position: relative;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 0 12px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.2);
    margin-bottom: 4px;
  }
  .header-logo {
    width: 40px;
    height: 40px;
    background: #fc3c44;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 18px;
    color: white;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 38px;
    font-weight: 500;
    color: white;
    flex: 1;
  }
  .header-date {
    font-size: 20px;
    color: rgba(255,255,255,0.55);
  }
  .scroll-container {
    height: 470px;
    overflow: hidden;
    position: relative;
  }
  .scroll-track { will-change: transform; }
  .track-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 2px;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }
  .rank {
    font-size: 28px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    width: 48px;
    text-align: right;
    flex-shrink: 0;
  }
  .rank.top3 { color: #f5c842; }
  .art {
    width: 52px;
    height: 52px;
    border-radius: 6px;
    flex-shrink: 0;
    object-fit: cover;
    background: #333;
  }
  .art-placeholder {
    width: 52px;
    height: 52px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title {
    font-size: 36px;
    font-weight: 500;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-artist {
    font-size: 32px;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: rgba(255,255,255,0.5);
    font-size: 20px;
    gap: 8px;
  }
  .dot-pulse { display: inline-flex; gap: 4px; }
  .dot-pulse div {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot-pulse div:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse div:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  .error { color: rgba(255,255,255,0.5); font-size: 20px; text-align: center; padding: 20px; line-height: 1.6; }
</style>
</head>
<body>
<div id="widget">
  <div class="header">
    <div class="header-logo">♪</div>
    <div class="header-title">Apple Music Top 100</div>
    <div class="header-date" id="chart-date"></div>
  </div>
  <div class="scroll-container">
    <div class="scroll-track" id="scroll-track">
      <div class="loading">
        <div class="dot-pulse"><div></div><div></div><div></div></div>
        &nbsp;Fetching chart data…
      </div>
    </div>
  </div>
</div>

<script>
const CACHE_KEY = 'applemusic_top100_cache';
const CACHE_TS_KEY = 'applemusic_top100_ts';
const ONE_DAY = 86400000;

const SWATCHES = ['#1a1a2e','#16213e','#0f3460','#533483','#2d6a4f','#1b4332','#6b2d3e','#3d405b','#2c3e50','#1a3a4a'];
function getSwatch(i) { return SWATCHES[i % SWATCHES.length]; }
function getInitials(title) {
  return title.split(' ').slice(0,2).map(w => w[0] || '').join('').toUpperCase() || '♪';
}
function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function buildRows(songs) {
  return songs.map((s, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? 'rank top3' : 'rank';
    const artEl = s.art
      ? `<img class="art" src="${s.art}" alt="" loading="lazy">`
      : `<div class="art-placeholder" style="background:${getSwatch(i)}">${getInitials(s.title)}</div>`;
    return `<div class="track-row">
      <div class="${rankClass}">${rank}</div>
      ${artEl}
      <div class="song-info">
        <div class="song-title">${s.title}</div>
        <div class="song-artist">${s.artist}</div>
      </div>
    </div>`;
  }).join('');
}

let animFrame;
function startScroll(track) {
  const half = track.scrollHeight / 2;
  let y = 0;
  const speed = 0.15;
  function step() {
    y += speed;
    if (y >= half) y -= half;
    track.style.transform = `translateY(-${y}px)`;
    animFrame = requestAnimationFrame(step);
  }
  animFrame = requestAnimationFrame(step);
}

async function fetchChart() {
  const now = Date.now();
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    const cachedTs = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0');
    if (cached && (now - cachedTs) < ONE_DAY) {
      return JSON.parse(cached);
    }
  } catch(e) {}

  // Apple Music Top 100 Songs (US) — official free RSS feed, no key, no CORS issues
  const feedUrl = 'https://rss.applemarketingtools.com/api/v2/us/music/most-played/100/songs.json';
  const res = await fetch(feedUrl);
  if (!res.ok) throw new Error(`Feed returned ${res.status}`);
  const json = await res.json();

  const results = json.feed.results || [];
  const songs = results.map(item => ({
    title: item.name,
    artist: item.artistName,
    art: item.artworkUrl100 || null,
  }));

  const week = formatDate(new Date());
  const parsed = { week, songs };

  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(parsed));
    localStorage.setItem(CACHE_TS_KEY, String(now));
  } catch(e) {}

  return parsed;
}

async function init() {
  try {
    const chart = await fetchChart();
    const dateEl = document.getElementById('chart-date');
    if (dateEl) dateEl.textContent = chart.week || formatDate(new Date());
    const track = document.getElementById('scroll-track');
    const songs = chart.songs || [];
    if (songs.length === 0) {
      track.innerHTML = '<div class="error">No chart data found.</div>';
      return;
    }
    const html = buildRows(songs);
    track.innerHTML = html + html;
    startScroll(track);
  } catch(e) {
    const track = document.getElementById('scroll-track');
    if (track) track.innerHTML = `<div class="error">Unable to load chart data.<br>${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
