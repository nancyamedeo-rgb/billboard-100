<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Billboard Hot 100</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --hot:#FF4D6D; --hot-dim:#A8324A;
    --bg:transparent;
    --ink:#F5F1EA; --ink-dim:#B9AFA4;
    --dim:#7C7268;
    --up:#4FD18B; --down:#FF4D6D; --flat:#8A8076;
    --rule:rgba(245,241,234,0.12);
  }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:transparent;
    font-family:'Inter',sans-serif; color:var(--ink);
  }

  .stage {
    width:100%; height:100%;
    display:flex; flex-direction:column;
    background:transparent;
  }

  /* ── MASTHEAD ── */
  .masthead {
    display:flex; align-items:baseline; justify-content:space-between;
    padding:3% 6% 2%;
    flex-shrink:0;
  }
  .masthead-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(22px, 4.2vw, 40px);
    letter-spacing:0.03em;
    color:var(--hot);
    line-height:1;
  }
  .masthead-sub {
    font-size:clamp(11px, 1.5vw, 15px);
    color:var(--dim);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-top:0.4em;
  }
  .masthead-date {
    font-size:clamp(11px, 1.6vw, 16px);
    color:var(--ink-dim);
    text-align:right;
    white-space:nowrap;
  }

  .status-line {
    padding:0 6% 2%;
    font-size:clamp(9px, 1.1vw, 12px);
    color:var(--hot-dim);
    letter-spacing:0.04em;
    flex-shrink:0;
  }
  .status-line.error { color:var(--down); }

  /* ── SCROLL AREA ── */
  .scroll-wrapper { flex:1; overflow:hidden; position:relative; }
  .scroll-track { display:flex; flex-direction:column; }

  /* ── SONG ROW ── */
  .song-row {
    display:flex; align-items:center; gap:4%;
    padding:3% 6%;
    position:relative;
  }
  .song-row::after {
    content:"";
    position:absolute; left:6%; right:6%; bottom:0;
    height:1px;
    background:var(--rule);
  }

  .rank-block {
    flex-shrink:0;
    width:13%;
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(26px, 6.2vw, 54px);
    color:var(--hot);
    line-height:0.9;
    text-align:center;
  }

  .song-info {
    flex:1; min-width:0;
    display:flex; flex-direction:column; gap:0.3em;
  }
  .song-title {
    font-size:clamp(15px, 2.6vw, 25px);
    font-weight:700;
    color:var(--ink);
    line-height:1.15;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .song-artist {
    font-size:clamp(11px, 1.6vw, 15px);
    color:var(--ink-dim);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .song-meta {
    font-size:clamp(9px, 1.2vw, 12px);
    color:var(--dim);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .move-block {
    flex-shrink:0;
    display:flex; flex-direction:column; align-items:flex-end; gap:0.3em;
  }
  .move-badge {
    display:flex; align-items:center; gap:0.3em;
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(15px, 2.4vw, 24px);
    letter-spacing:0.02em;
  }
  .move-badge.up { color:var(--up); }
  .move-badge.down { color:var(--down); }
  .move-badge.flat { color:var(--flat); }
  .move-badge.new {
    color:#16100E;
    background:var(--hot);
    font-family:'Inter',sans-serif;
    font-weight:800;
    font-size:clamp(9px, 1.2vw, 12px);
    letter-spacing:0.08em;
    padding:0.25em 0.7em;
    border-radius:3px;
    text-transform:uppercase;
  }
  .move-arrow { font-size:0.8em; line-height:1; }
  .peak-line {
    font-size:clamp(9px, 1.2vw, 12px);
    color:var(--dim);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="masthead">
    <div>
      <div class="masthead-title">HOT 100</div>
      <div class="masthead-sub">Billboard Chart</div>
    </div>
    <div class="masthead-date" id="chartDate">—</div>
  </div>
  <div class="status-line" id="statusLine">Loading…</div>

  <div class="scroll-wrapper">
    <div class="scroll-track" id="scrollTrack"></div>
  </div>
</div>

<script>
/* ── CONFIG ──
   Replace OWNER/REPO with your GitHub username and repo name, pointing at
   the raw JSON file kept up to date by the GitHub Action
   (see .github/workflows/update-hot100.yml + scripts/fetch_hot100.py). */
const DATA_URL = "https://raw.githubusercontent.com/OWNER/REPO/main/data/hot100.json";

const SCROLL_SPEED = 0.4; // px per frame, matches the other Dakboard widgets' pace

function buildMoveBadge(song) {
  if (song.isNew) {
    return `<div class="move-badge new">New</div>`;
  }
  if (!song.lastPos || song.lastPos === 0) {
    return `<div class="move-badge new">Re-entry</div>`;
  }
  const delta = song.lastPos - song.rank; // positive = moved up
  if (delta > 0) {
    return `<div class="move-badge up"><span class="move-arrow">▲</span>${delta}</div>`;
  }
  if (delta < 0) {
    return `<div class="move-badge down"><span class="move-arrow">▼</span>${Math.abs(delta)}</div>`;
  }
  return `<div class="move-badge flat"><span class="move-arrow">—</span></div>`;
}

function buildSongRow(song) {
  const metaParts = [];
  if (song.weeksOnChart) metaParts.push(song.weeksOnChart + (song.weeksOnChart === 1 ? " week" : " weeks") + " on chart");

  return `<div class="song-row">
    <div class="rank-block">${song.rank}</div>
    <div class="song-info">
      <div class="song-title">${song.title}</div>
      <div class="song-artist">${song.artist}</div>
      <div class="song-meta">${metaParts.join(" · ")}</div>
    </div>
    <div class="move-block">
      ${buildMoveBadge(song)}
      ${song.peakPos ? `<div class="peak-line">Peak #${song.peakPos}</div>` : ''}
    </div>
  </div>`;
}

let scrollPos = 0, scrollRAF = null;
function startScroll() {
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  const track = document.getElementById("scrollTrack");
  const half = track.scrollHeight / 2;
  if (half <= 0) return;
  function step() {
    scrollPos += SCROLL_SPEED;
    if (scrollPos >= half) scrollPos = 0;
    track.style.transform = "translateY(-" + scrollPos + "px)";
    scrollRAF = requestAnimationFrame(step);
  }
  scrollRAF = requestAnimationFrame(step);
}

function setStatus(msg, isError) {
  const el = document.getElementById("statusLine");
  el.textContent = msg;
  el.className = "status-line" + (isError ? " error" : "");
}

async function fetchHot100() {
  setStatus("Fetching latest chart…", false);
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("Fetch failed: HTTP " + res.status);
    const data = await res.json();

    if (data.status === "error" || !data.songs || data.songs.length === 0) {
      throw new Error(data.lastError || "No chart data available yet");
    }

    document.getElementById("chartDate").textContent = data.chartDate
      ? "Week of " + data.chartDate
      : "";

    const track = document.getElementById("scrollTrack");
    const rowsHtml = data.songs.map(buildSongRow).join("");
    track.innerHTML = rowsHtml + rowsHtml; // duplicate for seamless loop
    startScroll();

    const updated = data.updatedAt ? new Date(data.updatedAt) : new Date();
    const label = data.status === "stale"
      ? "Showing cached data from " + updated.toLocaleTimeString()
      : "Updated " + updated.toLocaleTimeString();
    setStatus(label, data.status === "stale");
  } catch (e) {
    console.error("Hot 100 fetch error:", e);
    setStatus("Update failed — showing last data", true);
  }
}

fetchHot100();
setInterval(fetchHot100, 15 * 60 * 1000);   // poll every 15 min
setTimeout(() => location.reload(), 6 * 60 * 60 * 1000); // safety-net reload every 6 hrs
</script>
</body>
</html>
