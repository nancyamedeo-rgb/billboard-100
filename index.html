<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billboard Hot 100</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, html { background: transparent; }
  #widget {
    background: transparent;
    width: 100%;
    font-family: sans-serif;
    color: white;
    overflow: hidden;
    height: 520px;
    position: relative;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 0 12px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.2);
    margin-bottom: 4px;
  }
  .header-logo {
    width: 40px;
    height: 40px;
    background: #c8102e;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: -0.5px;
    color: white;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 38px;
    font-weight: 500;
    color: white;
    flex: 1;
  }
  .header-date {
    font-size: 20px;
    color: rgba(255,255,255,0.55);
  }
  .scroll-container {
    height: 470px;
    overflow: hidden;
    position: relative;
  }
  .scroll-track {
    will-change: transform;
  }
  .track-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 2px;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }
  .rank {
    font-size: 28px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    width: 48px;
    text-align: right;
    flex-shrink: 0;
  }
  .rank.top3 { color: #f5c842; }
  .color-swatch {
    width: 52px;
    height: 52px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    overflow: hidden;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title {
    font-size: 36px;
    font-weight: 500;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-artist {
    font-size: 32px;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .weeks {
    font-size: 24px;
    color: rgba(255,255,255,0.4);
    text-align: right;
    flex-shrink: 0;
  }
  .weeks span { display: block; font-size: 18px; color: rgba(255,255,255,0.25); }
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    gap: 8px;
  }
  .dot-pulse { display: inline-flex; gap: 4px; }
  .dot-pulse div {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot-pulse div:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse div:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  .error { color: rgba(255,255,255,0.5); font-size: 20px; text-align: center; padding: 20px; }
</style>
</head>
<body>
<div id="widget">
  <div class="header">
    <div class="header-logo">BB</div>
    <div class="header-title">Billboard Hot 100</div>
    <div class="header-date" id="chart-date"></div>
  </div>
  <div class="scroll-container">
    <div class="scroll-track" id="scroll-track">
      <div class="loading" id="loading-msg">
        <div class="dot-pulse"><div></div><div></div><div></div></div>
        Fetching chart data…
      </div>
    </div>
  </div>
</div>

<script>
const CACHE_KEY = 'billboard_hot100_cache';
const CACHE_TS_KEY = 'billboard_hot100_ts';
const ONE_DAY = 86400000;

const SWATCHES = ['#1a1a2e','#16213e','#0f3460','#533483','#2d6a4f','#1b4332','#6b2d3e','#3d405b','#2c3e50','#1a3a4a'];

function getSwatch(i) { return SWATCHES[i % SWATCHES.length]; }

function getInitials(title) {
  return title.split(' ').slice(0,2).map(w => w[0] || '').join('').toUpperCase() || '♪';
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function buildRows(songs) {
  return songs.map((s, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? 'rank top3' : 'rank';
    const swatch = getSwatch(i);
    const initials = getInitials(s.title);
    const weeksLabel = s.weeks === 1 ? '1 wk' : `${s.weeks} wks`;
    return `<div class="track-row">
      <div class="${rankClass}">${rank}</div>
      <div class="color-swatch" style="background:${swatch}">${initials}</div>
      <div class="song-info">
        <div class="song-title">${s.title}</div>
        <div class="song-artist">${s.artist}</div>
      </div>
      <div class="weeks">${weeksLabel}<span>on chart</span></div>
    </div>`;
  }).join('');
}

let animFrame;
function startScroll(track) {
  const half = track.scrollHeight / 2;
  let y = 0;
  const speed = 0.15;
  function step() {
    y += speed;
    if (y >= half) y -= half;
    track.style.transform = `translateY(-${y}px)`;
    animFrame = requestAnimationFrame(step);
  }
  animFrame = requestAnimationFrame(step);
}

async function fetchChart() {
  const now = Date.now();
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    const cachedTs = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0');
    if (cached && (now - cachedTs) < ONE_DAY) {
      return JSON.parse(cached);
    }
  } catch(e) {}

  // Fetch Billboard Hot 100 via allorigins (free CORS proxy)
  const url = 'https://www.billboard.com/charts/hot-100/';
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxyUrl);
  const json = await res.json();
  const html = json.contents;

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Extract chart week
  const weekEl = doc.querySelector('.chart-detail-header__chart-date-subtitle, time');
  const week = weekEl ? weekEl.textContent.trim() : formatDate(new Date());

  // Extract songs — Billboard's markup uses li rows with h3 for title
  const songs = [];

  doc.querySelectorAll('li.o-chart-results-list__item').forEach(row => {
    const titleEl = row.querySelector('h3#title-of-a-story');
    if (!titleEl) return;
    const title = titleEl.textContent.trim();
    // Artist is typically the next sibling span after the h3
    const artistEl = titleEl.nextElementSibling;
    const artist = artistEl ? artistEl.textContent.trim() : '';
    // Weeks on chart label
    const allLabels = row.querySelectorAll('.c-label');
    let weeks = 1;
    allLabels.forEach(el => {
      const n = parseInt(el.textContent.trim());
      if (!isNaN(n) && n > 0) weeks = n;
    });
    songs.push({ title, artist, weeks });
  });

  // Fallback selector if Billboard changes markup
  if (songs.length === 0) {
    doc.querySelectorAll('[class*="chart-results-list"] h3').forEach((el, i) => {
      const title = el.textContent.trim();
      if (title) songs.push({ title, artist: '', weeks: 1 });
    });
  }

  const parsed = { week, songs: songs.slice(0, 100) };
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(parsed));
    localStorage.setItem(CACHE_TS_KEY, String(now));
  } catch(e) {}
  return parsed;
}

async function init() {
  try {
    const chart = await fetchChart();
    const dateEl = document.getElementById('chart-date');
    if (dateEl) dateEl.textContent = chart.week || formatDate(new Date());
    const track = document.getElementById('scroll-track');
    const songs = chart.songs || [];
    if (songs.length === 0) {
      track.innerHTML = '<div class="error">No chart data found.<br>Billboard may have updated their page layout.</div>';
      return;
    }
    const html = buildRows(songs);
    track.innerHTML = html + html;
    startScroll(track);
  } catch(e) {
    const track = document.getElementById('scroll-track');
    if (track) track.innerHTML = `<div class="error">Unable to load chart data.<br>${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
